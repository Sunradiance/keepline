<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="47 SaaS tools, half with no owner. Keepline is burn control for mid-market mess — renewals, overlaps, pricing leaks. Free. Local." />
  <title>Keepline — Burn & Commitment Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">KL</div>
        <div>
          <div class="brand-name">Keepline</div>
          <div class="brand-tag">Burn & Commitment Control</div>
        </div>
      </div>
      <p class="brand-why">Mid-market fights <em>SaaS sprawl, renewal traps, HR creep, API surprises, and pricing leaks</em> — with no procurement team. Keepline is the control tower.</p>
      <nav class="nav">
        <button class="nav-btn active" data-view="setup">Setup</button>
        <button class="nav-btn" data-view="command">Burn Command</button>
        <button class="nav-btn" data-view="research">Deep Dive</button>
        <button class="nav-btn" data-view="commitments">Commitments</button>
        <button class="nav-btn" data-view="renewals">Renewal Radar</button>
        <button class="nav-btn" data-view="headcount">HR & People</button>
        <button class="nav-btn" data-view="apis">API & Cloud</button>
        <button class="nav-btn" data-view="pricing">Pricing Leaks</button>
        <button class="nav-btn" data-view="overlap">Overlap Scanner</button>
        <button class="nav-btn" data-view="negotiate">Negotiation Lab</button>
        <button class="nav-btn" data-view="export">CFO Brief</button>
      </nav>
      <div class="sidebar-foot">
        <div class="burn-pill" id="burn-pill">—</div>
        <span class="mono">local-first · plug 3 APIs</span>
      </div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="view-title">Setup</h1>
          <p id="view-subtitle">Clone, .env, npm run dev</p>
        </div>
        <div class="topbar-actions">
          <button class="btn btn-ghost" id="btn-import">Import</button>
          <button class="btn btn-primary" id="btn-quick-add">+ Commitment</button>
        </div>
      </header>
      <section id="view-setup" class="view active"></section>
      <section id="view-command" class="view"></section>
      <section id="view-research" class="view"></section>
      <section id="view-commitments" class="view"></section>
      <section id="view-renewals" class="view"></section>
      <section id="view-headcount" class="view"></section>
      <section id="view-apis" class="view"></section>
      <section id="view-pricing" class="view"></section>
      <section id="view-overlap" class="view"></section>
      <section id="view-negotiate" class="view"></section>
      <section id="view-export" class="view"></section>
    </main>
  </div>
  <input type="file" id="import-file" accept=".json" hidden />
  <dialog id="modal" class="modal">
    <form id="modal-form" method="dialog">
      <header class="modal-head"><h2 id="modal-title">—</h2><button type="button" class="icon-btn" id="modal-close">×</button></header>
      <div id="modal-body" class="modal-body"></div>
      <footer class="modal-foot"><button type="button" class="btn btn-ghost" id="modal-cancel">Cancel</button><button type="submit" class="btn btn-primary">Save</button></footer>
    </form>
  </dialog>
  <div id="toast" class="toast" hidden></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
